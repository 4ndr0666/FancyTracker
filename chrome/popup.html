<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <link rel="stylesheet" href="popup.css">
</head>
<body class="electric-glass">
    <div class="container">
        <div class="header">
            <div class="logo">Ψ FancyTracker Ω</div>
            <div id="status-badge" class="badge">ARMED</div>
        </div>
        <div class="stats-bar">
            <div class="stat">Signals: <b id="signal-count">0</b></div>
            <div class="stat">Assets: <b id="asset-count">0</b></div>
        </div>
        <div class="tabs">
            <button id="tab-listeners" class="tab active">Listeners</button>
            <button id="tab-intercepts" class="tab">Traffic</button>
            <button id="tab-assets" class="tab" style="color:#FF00FF">Snatched</button>
        </div>
        <div id="viewport" class="content">
            <div id="list" class="list"></div>
        </div>
        <div class="footer">
            <button id="purge-btn" class="btn-magenta">PURGE DATA</button>
        </div>
    </div>
    <script src="popup-storage.js"></script>
    <script src="popup-ui.js"></script>
    <script src="popup-main.js"></script>
</body>
</html>
